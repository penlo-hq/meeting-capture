<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <style>
    body { font-family: system-ui; width: 320px; padding: 16px; }
    label { display: block; font-size: 12px; margin-top: 12px; color: #666; }
    input { width: 100%; margin-top: 4px; padding: 8px; box-sizing: border-box; }
    button { margin-top: 16px; width: 100%; padding: 10px; background: #111; color: #fff; border: none; border-radius: 8px; cursor: pointer; }
    .status { margin-top: 12px; font-size: 12px; color: green; }
  </style>
</head>
<body>
  <h3>Penlo Meeting Capture</h3>
  <p style="font-size:13px;color:#666">Captures Meet/Zoom captions into your Enterprise Brain.</p>
  <label>Brain base URL</label>
  <input id="url" placeholder="https://your-brain.railway.app" />
  <label>API key (pb_live_…)</label>
  <input id="key" type="password" placeholder="pb_live_..." />
  <button id="save">Save configuration</button>
  <div id="status" class="status"></div>
  <script src="popup.js"></script>
</body>
</html>
